name: Job Scraper

on:
  workflow_dispatch:          # disabled — cron removed

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Write Wellfound cookies
        env:
          WELLFOUND_COOKIES: ${{ secrets.WELLFOUND_COOKIES }}
        run: |
          if [ -n "$WELLFOUND_COOKIES" ]; then
            echo "$WELLFOUND_COOKIES" | base64 -d > wellfound_cookies.json
            echo "[Wellfound] Cookies file written"
          else
            echo "[Wellfound] WELLFOUND_COOKIES secret not set — will skip Wellfound scrape"
          fi

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WELLFOUND_EMAIL: ${{ secrets.WELLFOUND_EMAIL }}
          WELLFOUND_PASSWORD: ${{ secrets.WELLFOUND_PASSWORD }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: python main.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json jobs.json index.html
          git diff --staged --quiet || git commit -m "chore: update jobs [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
